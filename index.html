<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SMART SCANNER PRO</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body { font-family: Arial; margin:0; background:#f3f4f6; color:#111827; transition:0.3s; }
.dark { background:#0f172a; color:white; }

.header { background:#3b82f6; padding:15px; display:flex; align-items:center; color:white; }
.menu-btn { font-size:24px; cursor:pointer; margin-right:15px; }

.container { padding:20px; }

input, select {
width:100%; padding:12px; margin-top:10px;
border-radius:8px; border:1px solid #ccc;
}

button {
width:100%; padding:14px; margin-top:10px;
border:none; border-radius:8px;
background:#3b82f6; color:white;
}

img { width:100%; margin-top:10px; border-radius:10px; }

#editor {
background:white; padding:12px; margin-top:10px;
min-height:250px; border-radius:8px;
}

.dark #editor { background:#1e293b; color:white; }
</style>
</head>

<body>

<div class="header">
<div class="menu-btn" onclick="toggleDark()">🌙</div>
<h3>SMART SCANNER PRO</h3>
</div>

<div class="container">

<input type="file" accept="image/*" capture="environment" id="imageInput" onchange="previewImage()">

<img id="preview" style="display:none;">

<select id="lang">
<option value="eng">English</option>
<option value="swa">Swahili</option>
</select>

<button onclick="scan()">📸 SCAN FAST</button>

<div id="progress"></div>

<div id="editor" contenteditable="true"></div>

<button onclick="saveLocal()">💾 SAVE</button>
<button onclick="shareDoc()">📤 SHARE</button>
<button onclick="downloadPDF()">📄 PDF</button>
<button onclick="callSupport()">📞 CONTACT</button>

</div>

<script>

// 🌙 DARK MODE
function toggleDark(){
document.body.classList.toggle("dark");
}

// 📸 PREVIEW + COMPRESS IMAGE
function previewImage(){
let file=document.getElementById("imageInput").files[0];
if(!file) return;

let img=new Image();
img.onload=function(){
let canvas=document.createElement("canvas");
let ctx=canvas.getContext("2d");

// compress image
let scale=0.6;
canvas.width=img.width*scale;
canvas.height=img.height*scale;

ctx.drawImage(img,0,0,canvas.width,canvas.height);

document.getElementById("preview").src=canvas.toDataURL("image/jpeg",0.7);
document.getElementById("preview").style.display="block";

// save compressed
canvas.toBlob(blob=>{
document.compressedImage=blob;
},"image/jpeg",0.7);

};
img.src=URL.createObjectURL(file);
}

// ⚡ FAST OCR ONLINE
async function scan(){
let file=document.compressedImage || document.getElementById("imageInput").files[0];
if(!file) return alert("Chagua picha");

document.getElementById("progress").innerText="Scanning...";

let formData=new FormData();
formData.append("file",file);
formData.append("apikey","a8945c67e588957"); // API KEY YAKO TAYARI
formData.append("language",document.getElementById("lang").value);

let res=await fetch("https://api.ocr.space/parse/image",{
method:"POST",
body:formData
});

let data=await res.json();

if(data.ParsedResults){
let text=data.ParsedResults[0].ParsedText;
document.getElementById("editor").innerText=text;
localStorage.setItem("doc",text);
document.getElementById("progress").innerText="Done ✔";
}else{
document.getElementById("progress").innerText="Error";
}
}

// 💾 AUTO LOAD
window.onload=function(){
let saved=localStorage.getItem("doc");
if(saved) document.getElementById("editor").innerText=saved;
}

// SAVE
function saveLocal(){
let text=document.getElementById("editor").innerText;
localStorage.setItem("doc",text);
alert("Saved ✔");
}

// SHARE
function shareDoc(){
let text=document.getElementById("editor").innerText;
let blob=new Blob([text],{type:"text/plain"});
let file=new File([blob],"doc.txt");

if(navigator.share){
navigator.share({files:[file],title:"Document"});
}else{
alert("Sharing not supported");
}
}

// PDF
function downloadPDF(){
let {jsPDF}=window.jspdf;
let doc=new jsPDF();
let text=document.getElementById("editor").innerText;

let lines=doc.splitTextToSize(text,180);
let y=10;

lines.forEach(line=>{
if(y>280){ doc.addPage(); y=10; }
doc.text(line,10,y);
y+=7;
});

doc.save("document.pdf");
}

// CONTACT
function callSupport(){
if(confirm("Piga support 0672628000?")){
window.location.href="tel:0672628000";
}
}

</script>

</body>
</html>
